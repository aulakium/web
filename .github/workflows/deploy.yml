name: Deploy a Vercel (producción)

# Auto-deploy en cada push a main. Reemplaza la conexión GitHub↔Vercel del panel
# (que no engancha porque el team de Vercel quedó atado al login viejo de GitHub).
# Deploya con la Vercel CLI usando un token. Los IDs de abajo NO son secretos
# (salen de `.vercel/project.json`); el ÚNICO secreto a cargar en el repo es
# VERCEL_TOKEN → Settings ▸ Secrets and variables ▸ Actions ▸ New repository secret.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # permite lanzarlo a mano desde la pestaña Actions

env:
  VERCEL_ORG_ID: team_kqs1DLUHHvvLosvnv8DT7BVk
  VERCEL_PROJECT_ID: prj_yVGBv1wjR2QknkVEVjay8bIcOZcg

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Instalar Vercel CLI
        run: npm i -g vercel@latest
      - name: Traer config + env de producción
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy a producción
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
